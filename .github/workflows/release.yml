name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the v prefix
        required: true
        default: 0.1.0-rc.1

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  package-and-attest:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2

      - name: Normalize version
        run: echo "VERSION=${VERSION#v}" >> "$GITHUB_ENV"

      - name: Verify release source
        run: |
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
          cargo fmt --all --check
          cargo clippy --workspace --all-targets --locked -- -D warnings
          cargo test --workspace --locked

      - name: Materialize evidence for tested commit
        run: |
          python3 scripts/release/materialize-evidence.py \
            --template release/evidence/rc-0.1.0.json \
            --output release/evidence/verified.json \
            --commit "$GITHUB_SHA"
          cargo run -p sessionweft-release-gate --locked -- \
            --policy release/release-policy.json \
            --evidence release/evidence/verified.json \
            --level rc

      - name: Generate CycloneDX SBOM
        run: |
          python3 scripts/release/generate-sbom.py \
            --output dist/sessionweft.cdx.json \
            --version "$VERSION" \
            --commit "$GITHUB_SHA"

      - name: Build reproducible package
        env:
          RELEASE_EVIDENCE_PATH: release/evidence/verified.json
        run: |
          artifact="$(bash scripts/release/package.sh "$VERSION")"
          echo "artifact=$artifact" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT=$artifact" >> "$GITHUB_ENV"
        id: package

      - name: Generate provenance and SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.package.outputs.artifact }}
          sbom-path: dist/sessionweft.cdx.json

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: sessionweft-${{ env.VERSION }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
            dist/sessionweft.cdx.json
            release/evidence/verified.json
          if-no-files-found: error
          retention-days: 90

      - name: Publish immutable GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.tar.gz dist/*.sha256 dist/sessionweft.cdx.json release/evidence/verified.json \
            --verify-tag --generate-notes --title "SessionWeft $VERSION"
