name: execution-normalize-after-ci

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write

jobs:
  normalize:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_repository.full_name == github.repository &&
      github.event.workflow_run.pull_requests[0].head.ref == 'implementation/agent-tool-git-boundary-final'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply reviewed source hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          execution = Path("crates/sessionweft-execution/src/lib.rs")
          text = execution.read_text()

          if "tool descriptor must include its self-named Tool permission" not in text:
              start = text.index("impl ToolDescriptor")
              insert_at = text.index("        Ok(())", start)
              addition = '''        if !self
              .permissions
              .contains(&Permission::Tool(self.name.clone()))
          {
              return Err(ExecutionError::Validation(
                  "tool descriptor must include its self-named Tool permission".into(),
              ));
          }
'''
              text = text[:insert_at] + addition + text[insert_at:]

          mcp_start = text.index("impl<T> McpGateway<T>")
          mcp_marker = text.index("        let descriptor = self", mcp_start)
          if "agent/session scope mismatch" not in text[mcp_start:mcp_marker]:
              addition = '''        if invocation.session_id != agent.session_id || invocation.agent_id != agent.id {
              return Err(ToolError::Denied("agent/session scope mismatch".into()));
          }
'''
              text = text[:mcp_marker] + addition + text[mcp_marker:]

          old = '["worktree", "add", "-b", branch, relative_path]'
          new = '["worktree", "add", "-b", branch, "--", relative_path]'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit("Git worktree marker not found")
          execution.write_text(text)

          sqlite = Path("crates/sessionweft-execution-sqlite/src/lib.rs")
          text = sqlite.read_text()
          old = '.filter(|record| record.as_ref().is_err_or(|agent| agent.is_stale_at(now)))'
          new = '''.filter(|record| match record {
                  Ok(agent) => agent.is_stale_at(now),
                  Err(_) => true,
              })'''
          if old in text:
              text = text.replace(old, new, 1)
          elif "Ok(agent) => agent.is_stale_at(now)" not in text:
              raise SystemExit("stale-agent marker not found")
          sqlite.write_text(text)
          PY
      - name: Format and refresh lockfile
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit normalized source
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- Cargo.lock '*.rs'
            git commit -m "fix: harden and format execution boundary"
            git push origin HEAD:${{ github.event.workflow_run.pull_requests[0].head.ref }}
          fi
