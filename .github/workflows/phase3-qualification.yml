name: phase3-qualification

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/sessionweft-plugin-wasm/**"
      - "crates/sessionweft-adapter-certification/**"
      - "crates/sessionweft-tenancy/**"
      - "crates/sessionweft-billing/**"
      - "crates/sessionweft-billing-stripe/**"
      - "crates/sessionweft-saas-postgres/**"
      - "release/adapters/**"
      - "scripts/release/materialize-adapter-certifications.py"
      - ".github/workflows/phase3-qualification.yml"
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/sessionweft-plugin-wasm/**"
      - "crates/sessionweft-adapter-certification/**"
      - "crates/sessionweft-tenancy/**"
      - "crates/sessionweft-billing/**"
      - "crates/sessionweft-billing-stripe/**"
      - "crates/sessionweft-saas-postgres/**"
      - "release/adapters/**"
      - "scripts/release/materialize-adapter-certifications.py"
      - ".github/workflows/phase3-qualification.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase3-${{ github.ref }}
  cancel-in-progress: true

jobs:
  portable-sandbox:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify portable sandbox
        run: |
          cargo clippy -p sessionweft-plugin-wasm --all-targets --locked -- -D warnings
          cargo test -p sessionweft-plugin-wasm --locked

  tenant-billing:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sessionweft
          POSTGRES_PASSWORD: sessionweft
          POSTGRES_DB: sessionweft
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sessionweft -d sessionweft"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SESSIONWEFT_TEST_POSTGRES_URL: postgres://sessionweft:sessionweft@127.0.0.1:5432/sessionweft
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify tenancy and billing contracts
        run: |
          set -o pipefail
          {
            cargo clippy \
              -p sessionweft-tenancy \
              -p sessionweft-billing \
              -p sessionweft-billing-stripe \
              -p sessionweft-saas-postgres \
              --all-targets --locked -- -D warnings
            cargo test -p sessionweft-tenancy -p sessionweft-billing -p sessionweft-billing-stripe --locked
            cargo test -p sessionweft-saas-postgres --test tenant_isolation --locked -- --ignored --test-threads=1
          } 2>&1 | tee tenant-billing.log
      - name: Upload tenant and billing diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase3-tenant-billing-${{ github.sha }}
          path: tenant-billing.log
          if-no-files-found: warn
          retention-days: 7

  certification:
    needs: [portable-sandbox, tenant-billing]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify certification implementation
        run: |
          cargo clippy -p sessionweft-adapter-certification --all-targets --locked -- -D warnings
          cargo test -p sessionweft-adapter-certification --locked
      - name: Materialize exact-commit certifications
        run: |
          python3 scripts/release/materialize-adapter-certifications.py \
            --manifests release/adapters/manifests \
            --output release/adapters/verified \
            --commit "$GITHUB_SHA"
          cargo run -p sessionweft-adapter-certification --locked -- \
            release/adapters/manifests release/adapters/verified .
      - name: Upload adapter evidence
        uses: actions/upload-artifact@v4
        with:
          name: phase3-adapter-certifications-${{ github.sha }}
          path: release/adapters/verified/*.json
          if-no-files-found: error
          retention-days: 30
