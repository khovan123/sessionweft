name: phase3-lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lockfile:
    if: github.head_ref == 'feature/multitenant-billing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Refresh lockfile
        run: cargo metadata --format-version 1 >/dev/null
      - name: Verify forbidden graph remains absent
        run: |
          if cargo tree -i rsa --target all >/tmp/rsa-tree.log 2>&1; then
            cat /tmp/rsa-tree.log
            echo "rsa entered the active graph" >&2
            exit 1
          fi
      - name: Commit lockfile
        run: |
          if git diff --quiet -- Cargo.lock; then
            echo "Cargo.lock is current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "build: refresh Phase 3 lockfile"
          git push origin HEAD:${{ github.head_ref }}
