name: prepare-resumable-clients

on:
  push:
    branches:
      - implementation/resumable-clients

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Apply deterministic source patch
        run: python .github/scripts/patch_resumable_clients.py
      - name: Format Rust and lock dependencies
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Lock VS Code dependencies
        working-directory: extensions/sessionweft-vscode
        run: npm install --package-lock-only
      - name: Commit prepared client slice
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock apps crates extensions/sessionweft-vscode/package-lock.json
            git commit -m "build: prepare resumable client protocol"
            git push origin HEAD:${{ github.ref_name }}
          fi
