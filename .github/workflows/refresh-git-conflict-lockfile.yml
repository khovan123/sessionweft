name: refresh-git-conflict-lockfile

on:
  push:
    branches:
      - implementation/git-merge-conflict-recovery

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo generate-lockfile
      - name: Commit refreshed lockfile
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "build: refresh Git merge recovery lockfile"
            git push origin HEAD:${{ github.ref_name }}
          fi
