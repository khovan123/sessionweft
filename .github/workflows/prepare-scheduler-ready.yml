name: prepare-scheduler-ready

on:
  push:
    branches:
      - implementation/durable-scheduler-claims-ready

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Move test-only imports
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('crates/sessionweft-scheduler-sqlite/src/lib.rs')
          text = path.read_text()
          text = text.replace('use chrono::Utc;\n', '', 1)
          text = text.replace(
              'use sessionweft_orchestration::{WorkflowExecution, WorkflowNodeStatus};',
              'use sessionweft_orchestration::WorkflowExecution;',
              1,
          )
          marker = '''    use sessionweft_core::SessionId;
              use sessionweft_execution::{AgentManifest, AgentRole, AgentService, Capability};
              use sessionweft_execution_sqlite::SqliteAgentRepository;
              use sessionweft_orchestration::{
                  OrchestrationService, WorkflowDefinition, WorkflowNodeDefinition, WorkflowNodeKind,
                  WorkflowStatus,
              };
          '''
          marker = marker.replace('              ', '')
          replacement = '''    use chrono::Utc;
              use sessionweft_core::SessionId;
              use sessionweft_execution::{AgentManifest, AgentRole, AgentService, Capability};
              use sessionweft_execution_sqlite::SqliteAgentRepository;
              use sessionweft_orchestration::{
                  OrchestrationService, WorkflowDefinition, WorkflowNodeDefinition, WorkflowNodeKind,
                  WorkflowNodeStatus, WorkflowStatus,
              };
          '''
          replacement = replacement.replace('              ', '')
          if marker not in text:
              raise SystemExit('scheduler test import marker not found')
          path.write_text(text.replace(marker, replacement, 1))
          PY
          cargo fmt --all
      - name: Commit prepared source
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "fix: scope scheduler imports to tests"
            git push origin HEAD:${{ github.ref_name }}
          fi
