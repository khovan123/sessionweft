name: phase3-patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'feature/multitenant-billing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply compiler-driven patch
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('crates/sessionweft-saas-postgres/src/tenancy.rs')
          text = path.read_text()
          text = text.replace('use chrono::Utc;\n', '')
          old = 'fn repository_error(error: sqlx::Error) -> TenancyError {\n    TenancyError::Repository(error.to_string())\n}'
          new = 'fn repository_error(error: impl std::fmt::Display) -> TenancyError {\n    TenancyError::Repository(error.to_string())\n}'
          if old not in text:
              raise SystemExit('repository_error marker not found')
          path.write_text(text.replace(old, new))
          PY
          cargo fmt --all
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/sessionweft-saas-postgres/src/tenancy.rs
          git commit -m "fix(saas): normalize repository error mapping"
          git push origin HEAD:${{ github.head_ref }}
