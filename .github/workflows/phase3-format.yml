name: phase3-format

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  rustfmt:
    if: github.head_ref == 'feature/multitenant-billing'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format workspace
        run: cargo fmt --all
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "Formatting is current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add crates/sessionweft-tenancy crates/sessionweft-billing crates/sessionweft-billing-stripe crates/sessionweft-saas-postgres
          git commit -m "style: format Phase 3 tenancy and billing"
          git push origin HEAD:${{ github.head_ref }}
