name: phase3-security-lock

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  refresh:
    if: github.head_ref == 'feature/portable-sandbox-certification'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Refresh patched Wasmtime lock graph
        run: |
          cargo metadata --format-version 1 >/dev/null
          if cargo tree -i wasmtime-wasi --target all >/tmp/wasi.log 2>&1; then
            cat /tmp/wasi.log
            exit 1
          fi
          if cargo tree -i rsa --target all >/tmp/rsa.log 2>&1; then
            cat /tmp/rsa.log
            exit 1
          fi
          rm .github/workflows/phase3-security-lock.yml
      - name: Commit lockfile and remove helper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock .github/workflows/phase3-security-lock.yml
          git commit -m "build: lock patched Wasmtime 36 security graph"
          git push origin HEAD:${{ github.head_ref }}
