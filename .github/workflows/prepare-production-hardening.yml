name: prepare-production-hardening

on:
  push:
    branches:
      - release/production-hardening

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format and refresh locked dependencies
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit generated updates
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock Cargo.toml crates/sessionweft-release-gate \
              crates/sessionweft-service-postgres/tests/contention.rs \
              crates/sessionweft-workspace-intelligence/tests/release_capacity.rs
            git commit -m "build: prepare production hardening"
            git push origin HEAD:${{ github.ref_name }}
          fi
