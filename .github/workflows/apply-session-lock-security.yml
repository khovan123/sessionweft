name: apply-session-lock-security

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  apply:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'security/session-scoped-locks-v2'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Fetch reviewed patch script
        run: |
          git fetch origin main --depth=1
          git show origin/main:scripts/internal/apply_session_lock_security.py > /tmp/apply_session_lock_security.py
      - name: Apply security patch
        run: |
          python /tmp/apply_session_lock_security.py
          cargo fmt --all
      - name: Commit security implementation
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "security: enforce Session-scoped lock lifecycle"
            git push origin HEAD:security/session-scoped-locks-v2
          fi
