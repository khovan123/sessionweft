name: contributors

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contributors-main
  cancel-in-progress: true

jobs:
  avatars:
    if: github.repository == 'khovan123/sessionweft'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Refresh contributor avatars
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/docs/update-contributors.py
      - name: Commit updated avatars
        run: |
          if git diff --quiet -- CONTRIBUTING.md; then
            echo "Contributor avatars are current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CONTRIBUTING.md
          git commit -m "docs: refresh contributor avatars"
          git push origin HEAD:main
