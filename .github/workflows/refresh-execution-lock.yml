name: refresh-execution-lock

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write

jobs:
  refresh:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch == 'implementation/agent-tool-git-boundary-ready'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implementation/agent-tool-git-boundary-ready
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Refresh dependency lock
        run: cargo generate-lockfile
      - name: Commit Cargo.lock
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "build: refresh lockfile for execution crates"
            git push origin HEAD:implementation/agent-tool-git-boundary-ready
          fi
