name: prepare-mcp-isolation

on:
  push:
    branches:
      - implementation/mcp-plugin-isolation

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply deterministic fixes
        run: |
          python .github/scripts/patch_mcp_isolation_slice.py
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit prepared MCP isolation slice
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock Cargo.toml crates/sessionweft-mcp crates/sessionweft-mcp-sqlite
            git commit -m "build: prepare MCP plugin isolation"
            git push origin HEAD:${{ github.ref_name }}
          fi
