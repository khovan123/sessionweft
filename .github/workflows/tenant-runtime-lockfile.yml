name: tenant-runtime-lockfile

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  lockfile:
    if: github.head_ref == 'feature/tenant-runtime-api-clean'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Refresh lockfile and remove helper
        run: |
          cargo metadata --format-version 1 >/dev/null
          if cargo tree -i rsa --target all >/tmp/rsa.log 2>&1; then
            cat /tmp/rsa.log
            exit 1
          fi
          rm .github/workflows/tenant-runtime-lockfile.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock .github/workflows/tenant-runtime-lockfile.yml
          git commit -m "build: lock tenant Runtime and SaaS API"
          git push origin HEAD:${{ github.head_ref }}
