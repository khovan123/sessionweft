name: remove-unused-execution-import

on:
  push:
    branches:
      - implementation/provider-tool-execution-ledger

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Remove unused import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/sessionweftd/src/bin/sessionweft-execution-worker.rs')
          text = path.read_text()
          target = '    TaskExecutionService, TaskExecutionStatus,\n'
          replacement = '    TaskExecutionService,\n'
          if target not in text:
              raise SystemExit('unused TaskExecutionStatus import not found')
          path.write_text(text.replace(target, replacement, 1))
          PY
          cargo fmt --all
      - name: Commit import cleanup
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "fix: remove unused execution worker import"
            git push origin HEAD:${{ github.ref_name }}
          fi
