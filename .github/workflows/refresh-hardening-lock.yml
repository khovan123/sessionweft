name: refresh-hardening-lock

on:
  push:
    branches: [release/production-hardening]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/production-hardening
      - uses: dtolnay/rust-toolchain@1.88.0
      - run: cargo metadata --format-version 1 > /dev/null
      - name: Commit lockfile if needed
        run: |
          if git status --porcelain Cargo.lock | grep -q .; then
            git config user.name sessionweft-ci
            git config user.email sessionweft-ci@users.noreply.github.com
            git add Cargo.lock
            git commit -m "build: remove unused SQLx MySQL dependency graph"
            git push origin HEAD:release/production-hardening
          fi
