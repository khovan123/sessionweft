name: refresh-hardening-lock

on:
  push:
    branches: [release/production-hardening]

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/production-hardening
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Remove unused SQLx MySQL dependency graph
        run: |
          python3 .github/scripts/remove_unused_sqlx_mysql.py
          cargo fmt --all
          cargo generate-lockfile
          if cargo tree -i rsa >/tmp/rsa-tree.txt 2>&1; then
            cat /tmp/rsa-tree.txt
            echo "rsa remains in dependency graph" >&2
            exit 1
          fi
      - name: Commit security fix if needed
        run: |
          if [ -n "$(git status --porcelain Cargo.toml Cargo.lock crates/sessionweft-service-postgres/src/database.rs)" ]; then
            git config user.name sessionweft-ci
            git config user.email sessionweft-ci@users.noreply.github.com
            git add Cargo.toml Cargo.lock crates/sessionweft-service-postgres/src/database.rs
            git commit -m "security: remove unused vulnerable RSA dependency"
            git push origin HEAD:release/production-hardening
          fi
