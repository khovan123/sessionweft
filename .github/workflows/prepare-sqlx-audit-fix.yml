name: prepare-sqlx-audit-fix

on:
  push:
    branches: [release/production-hardening]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Remove unused SQLx MySQL feature chain
        run: |
          python3 .github/scripts/remove_unused_sqlx_mysql.py
          cargo fmt --all
          cargo generate-lockfile
          if cargo tree -i rsa >/tmp/rsa-tree.txt 2>&1; then
            cat /tmp/rsa-tree.txt
            echo "rsa remains in dependency graph" >&2
            exit 1
          fi
      - name: Commit dependency cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock crates/sessionweft-service-postgres/src/database.rs
          git commit -m "security: remove unused vulnerable RSA dependency"
          git push origin HEAD:${{ github.ref_name }}
