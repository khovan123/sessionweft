name: wire-control-plane-daemon

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  wire:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'implementation/control-plane-http-cli'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Wire daemon to Control Plane
        run: |
          python scripts/internal/wire_control_plane_daemon.py
          rm scripts/internal/wire_control_plane_daemon.py
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit daemon wiring
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- Cargo.lock apps/sessionweftd scripts/internal
            git commit -m "feat: wire daemon to Runtime Control Plane"
            git push origin HEAD:implementation/control-plane-http-cli
          fi
