name: diagnose-v0.2.0-publication

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-v0.2.0-publication.yml"

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Capture final v0.2.0 verification state
        run: |
          set -euo pipefail
          mkdir -p diagnostics
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/verify-v0.2.0-publication.yml/runs?per_page=20" \
            > diagnostics/verify-runs.json
          jq '[.workflow_runs[] | {id, name, status, conclusion, run_number, event, head_sha, head_branch, html_url}]' \
            diagnostics/verify-runs.json > diagnostics/verify-run-summary.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?per_page=20" \
            > diagnostics/release-runs.json
          jq '[.workflow_runs[] | {id, name, status, conclusion, run_number, event, head_sha, head_branch, html_url}]' \
            diagnostics/release-runs.json > diagnostics/release-run-summary.json
          gh release view v0.2.0 --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,targetCommitish,assets \
            > diagnostics/v0.2.0-release.json
          cat diagnostics/release-run-summary.json
          cat diagnostics/verify-run-summary.json

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: v0.2.0-publication-diagnostics
          path: diagnostics
          if-no-files-found: error
          retention-days: 3
