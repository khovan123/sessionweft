name: refresh-security-lock

on:
  push:
    branches:
      - release/production-hardening-v2

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Regenerate dependency lockfile
        run: cargo generate-lockfile
      - name: Commit reduced dependency graph
        run: |
          if [ -n "$(git status --porcelain -- Cargo.lock)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "security: remove unused MySQL RSA dependency path"
            git push origin HEAD:${{ github.ref_name }}
          fi
