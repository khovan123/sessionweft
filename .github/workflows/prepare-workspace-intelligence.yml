name: prepare-workspace-intelligence

on:
  push:
    branches:
      - implementation/workspace-intelligence

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Format and lock dependencies
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock Cargo.toml crates/sessionweft-workspace-intelligence
            git commit -m "build: prepare workspace intelligence"
            git push origin HEAD:${{ github.ref_name }}
          fi
