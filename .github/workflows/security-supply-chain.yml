name: security-supply-chain

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "apps/**"
      - "extensions/sessionweft-vscode/package*.json"
      - "scripts/security/**"
      - "scripts/release/generate-sbom.py"
      - "deny.toml"
      - ".github/workflows/security-supply-chain.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2

      - name: Install security tooling
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Prove SQLx MySQL and RSA are absent from the active graph
        run: |
          if cargo tree -i rsa --target all > rsa-tree.log 2>&1; then
            cat rsa-tree.log
            echo "rsa is active in the build graph" >&2
            exit 1
          fi
          if cargo tree -i sqlx-mysql --target all > sqlx-mysql-tree.log 2>&1; then
            cat sqlx-mysql-tree.log
            echo "sqlx-mysql is active in the build graph" >&2
            exit 1
          fi
          cat rsa-tree.log
          cat sqlx-mysql-tree.log

      - name: RustSec advisory audit
        run: |
          set +e
          cargo audit --json > cargo-audit.json 2> cargo-audit.stderr
          status=$?
          cat cargo-audit.stderr
          python3 -m json.tool cargo-audit.json || cat cargo-audit.json
          exit $status

      - name: Upload RustSec diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: |
            cargo-audit.json
            cargo-audit.stderr
            rsa-tree.log
            sqlx-mysql-tree.log
          if-no-files-found: warn
          retention-days: 7

      - name: License, source and duplicate dependency policy
        run: |
          set +e
          cargo deny check advisories bans licenses sources > cargo-deny.log 2>&1
          status=$?
          cat cargo-deny.log
          exit $status

      - name: Upload cargo-deny diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-deny-report
          path: cargo-deny.log
          if-no-files-found: warn
          retention-days: 7

      - name: Scan tracked source for leaked secrets
        run: bash scripts/security/scan-secrets.sh

      - name: Audit VS Code extension dependencies
        working-directory: extensions/sessionweft-vscode
        run: npm audit --audit-level=high

      - name: Generate CycloneDX SBOM
        run: |
          python3 scripts/release/generate-sbom.py \
            --output dist/sessionweft.cdx.json \
            --version 0.1.0-rc.1 \
            --commit "$GITHUB_SHA"
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path("dist/sessionweft.cdx.json")
          data = json.loads(path.read_text())
          assert data["bomFormat"] == "CycloneDX"
          assert data["specVersion"] == "1.6"
          assert len(data["components"]) > 0
          print(f"validated {len(data['components'])} SBOM components")
          PY

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sessionweft-sbom
          path: dist/sessionweft.cdx.json
          if-no-files-found: error
          retention-days: 30
