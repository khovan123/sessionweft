name: publish-v0.2.0-tag

on:
  push:
    branches: [main]
    paths:
      - "release/publication/v0.2.0.json"
      - ".github/workflows/publish-v0.2.0-tag.yml"
  workflow_run:
    workflows: ["ga-approval", "repair-v0.1.0-publication"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: publish-v0.2.0-tag
  cancel-in-progress: false

jobs:
  tag-and-release:
    if: >-
      github.repository == 'khovan123/sessionweft' &&
      (
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        ) ||
        (
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main'
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      CANDIDATE_COMMIT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      TAG: v0.2.0
      VERSION: 0.2.0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CANDIDATE_COMMIT }}
          fetch-depth: 0

      - name: Validate immutable publication authorization
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          marker = json.loads(Path('release/publication/v0.2.0.json').read_text())
          expected = {
              'schema_version': 1,
              'release': '0.2.0',
              'tag': 'v0.2.0',
              'status': 'approved',
              'publish_from': 'main',
              'immutable': True,
          }
          for key, value in expected.items():
              if marker.get(key) != value:
                  raise SystemExit(f'invalid publication marker {key}: {marker.get(key)!r}')
          required = {
              'ci',
              'security-supply-chain',
              'service-mode',
              'production-hardening',
              'saas-runtime',
              'phase3-qualification',
              'ga-approval',
          }
          if set(marker.get('required_exact_commit_gates', [])) != required:
              raise SystemExit('publication marker exact-commit gate set is incomplete')
          PY

      - name: Resolve immutable release commit
        run: |
          if existing="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq .object.sha 2>/dev/null)"; then
            echo "TARGET_COMMIT=$existing" >> "$GITHUB_ENV"
            echo "TAG_EXISTS=true" >> "$GITHUB_ENV"
            echo "$TAG already exists at immutable commit $existing"
          else
            echo "TARGET_COMMIT=$CANDIDATE_COMMIT" >> "$GITHUB_ENV"
            echo "TAG_EXISTS=false" >> "$GITHUB_ENV"
            echo "$TAG will be created at qualified commit $CANDIDATE_COMMIT"
          fi

      - name: Require verified v0.1.0 publication
        run: |
          gh release view v0.1.0 --repo "$GITHUB_REPOSITORY" \
            --json tagName,isDraft,isPrerelease,assets > /tmp/v0.1.0-release.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path('/tmp/v0.1.0-release.json').read_text())
          if release['tagName'] != 'v0.1.0' or release['isDraft'] or release['isPrerelease']:
              raise SystemExit('v0.1.0 is not a published stable release')
          names = {asset['name'] for asset in release['assets']}
          required = {'sessionweft.cdx.json', 'ga-verified.json'}
          if not required.issubset(names):
              raise SystemExit(f'v0.1.0 publication assets are incomplete: {sorted(names)}')
          runtime = [name for name in names if name.startswith('sessionweft-0.1.0-') and name.endswith('.tar.gz')]
          runtime_sha = [name for name in names if name.startswith('sessionweft-0.1.0-') and name.endswith('.tar.gz.sha256')]
          vscode = {'sessionweft-vscode-0.1.0.tar.gz', 'sessionweft-vscode-0.1.0.tar.gz.sha256'}
          if not runtime or len(runtime) != len(runtime_sha) or not vscode.issubset(names):
              raise SystemExit(f'v0.1.0 archive assets are incomplete: {sorted(names)}')
          PY

      - name: Require every exact-commit release gate
        run: |
          for attempt in $(seq 1 90); do
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${TARGET_COMMIT}&per_page=100" > /tmp/runs.json
            if python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          required = {
              'ci',
              'security-supply-chain',
              'service-mode',
              'production-hardening',
              'saas-runtime',
              'phase3-qualification',
              'ga-approval',
          }
          runs = json.loads(Path('/tmp/runs.json').read_text())['workflow_runs']
          latest = {}
          for run in runs:
              name = run['name']
              if name not in required:
                  continue
              current = latest.get(name)
              if current is None or run['run_number'] > current['run_number']:
                  latest[name] = run
          missing = required - latest.keys()
          failed = {
              name: run.get('conclusion')
              for name, run in latest.items()
              if run.get('status') == 'completed' and run.get('conclusion') != 'success'
          }
          pending = {
              name: run.get('status')
              for name, run in latest.items()
              if run.get('status') != 'completed'
          }
          if failed:
              raise SystemExit(f'exact-commit release gate failed: {failed}')
          if missing or pending:
              print(f'waiting for exact-commit gates; missing={sorted(missing)} pending={pending}')
              raise SystemExit(75)
          print(f"all exact-commit release gates passed for {os.environ['TARGET_COMMIT']}")
          PY
            then
              break
            else
              status=$?
              if [[ "$status" -ne 75 ]]; then
                exit "$status"
              fi
              sleep 20
            fi
            if [[ "$attempt" -eq 90 ]]; then
              echo "exact-commit gates did not finish before timeout" >&2
              exit 1
            fi
          done

      - name: Verify main still identifies a new tag candidate
        if: env.TAG_EXISTS != 'true'
        run: |
          main_commit="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq .object.sha)"
          test "$main_commit" = "$TARGET_COMMIT"

      - name: Create immutable v0.2.0 tag
        if: env.TAG_EXISTS != 'true'
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$TARGET_COMMIT" >/dev/null

      - name: Dispatch release workflow when publication is missing
        id: dispatch
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "required=false" >> "$GITHUB_OUTPUT"
            echo "$TAG GitHub Release already exists"
          else
            echo "required=true" >> "$GITHUB_OUTPUT"
            gh workflow run release.yml \
              --repo "$GITHUB_REPOSITORY" \
              --ref "$TAG" \
              -f version="$VERSION"
          fi

      - name: Wait for stable release publication
        run: |
          for attempt in $(seq 1 180); do
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                --json tagName,isDraft,isPrerelease,assets > /tmp/v0.2.0-release.json 2>/dev/null; then
              python3 - <<'PY'
          import json
          from pathlib import Path

          release = json.loads(Path('/tmp/v0.2.0-release.json').read_text())
          if release['tagName'] != 'v0.2.0' or release['isDraft'] or release['isPrerelease']:
              raise SystemExit('v0.2.0 is not a published stable release')
          names = {asset['name'] for asset in release['assets']}
          required = {'sessionweft.cdx.json', 'verified.json', 'activation.json'}
          if not required.issubset(names):
              raise SystemExit(f'v0.2.0 publication assets are incomplete: {sorted(names)}')
          print(f'v0.2.0 stable release contains {len(names)} assets')
          PY
              exit 0
            fi

            gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?per_page=20" \
              > /tmp/release-runs.json
            state="$(jq -r --arg sha "$TARGET_COMMIT" \
              '[.workflow_runs[] | select(.head_sha == $sha and .event == "workflow_dispatch")][0] | if . == null then "missing" else (.status + ":" + (.conclusion // "")) end' \
              /tmp/release-runs.json)"
            case "$state" in
              completed:success) ;;
              completed:*)
                echo "release workflow failed for $TARGET_COMMIT: $state" >&2
                exit 1
                ;;
              *) echo "waiting for release workflow: $state" ;;
            esac
            sleep 20
          done
          echo "v0.2.0 release was not published before timeout" >&2
          exit 1
