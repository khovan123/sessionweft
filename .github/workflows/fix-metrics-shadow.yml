name: fix-metrics-shadow

on:
  push:
    branches:
      - release/production-hardening-v2

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - name: Apply metrics wiring fix
        run: |
          python .github/scripts/fix_metrics_shadow.py
          cargo fmt --all
      - name: Commit metrics wiring fix
        run: |
          if [ -n "$(git status --porcelain -- apps/sessionweftd/src/main.rs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add apps/sessionweftd/src/main.rs
            git commit -m "fix: avoid metrics handler shadowing"
            git push origin HEAD:${{ github.ref_name }}
          fi
