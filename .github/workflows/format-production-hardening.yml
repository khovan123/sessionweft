name: format-production-hardening

on:
  push:
    branches: [release/production-hardening]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/production-hardening
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt
      - run: cargo fmt --all
      - name: Commit formatting if needed
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name sessionweft-ci
          git config user.email sessionweft-ci@users.noreply.github.com
          git add -- '*.rs'
          git commit -m "style: format production hardening sources"
          git push origin HEAD:release/production-hardening
