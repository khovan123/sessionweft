name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply Session-scoped lock security
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'security/session-scoped-locks'
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          def sub_once(text, pattern, replacement, label):
              text, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise SystemExit(f"expected one {label} patch, found {count}")
              return text

          orchestration = Path('crates/sessionweft-orchestration/src/lib.rs')
          text = orchestration.read_text()
          if 'async fn get_lock(' not in text:
              text = sub_once(
                  text,
                  r'(    async fn acquire_lock\(.*?\) -> Result<LockLease, RepositoryError>;\n\n)(    async fn heartbeat_lock\()',
                  r'''\1    async fn get_lock(
              &self,
              lock_id: Uuid,
          ) -> Result<Option<LockLease>, RepositoryError>;

          async fn list_session_locks(
              &self,
              session_id: SessionId,
              workspace_id: &str,
              now: DateTime<Utc>,
          ) -> Result<Vec<LockLease>, RepositoryError>;

      \2''',
                  'repository lock lookup',
              )
          if 'pub async fn get_lock(' not in text:
              text = sub_once(
                  text,
                  r'(    pub async fn acquire_lock\(.*?\.map_err\(OrchestrationError::Repository\)\n    \}\n\n)(    pub async fn heartbeat_lock\()',
                  r'''\1    pub async fn get_lock(
              &self,
              lock_id: Uuid,
          ) -> Result<Option<LockLease>, OrchestrationError> {
              self.repository
                  .get_lock(lock_id)
                  .await
                  .map_err(OrchestrationError::Repository)
          }

          pub async fn list_session_locks(
              &self,
              session_id: SessionId,
              workspace_id: &str,
          ) -> Result<Vec<LockLease>, OrchestrationError> {
              self.repository
                  .list_session_locks(session_id, workspace_id, Utc::now())
                  .await
                  .map_err(OrchestrationError::Repository)
          }

      \2''',
                  'orchestration service lock lookup',
              )
          orchestration.write_text(text)

          sqlite = Path('crates/sessionweft-orchestration-sqlite/src/lib.rs')
          text = sqlite.read_text()
          if 'async fn get_lock(' not in text:
              text = sub_once(
                  text,
                  r'(    async fn acquire_lock\(.*?        Ok\(lease\)\n    \}\n\n)(    async fn heartbeat_lock\()',
                  r'''\1    async fn get_lock(
              &self,
              lock_id: Uuid,
          ) -> Result<Option<LockLease>, RepositoryError> {
              let row = sqlx::query("SELECT data_json FROM lock_leases WHERE lock_id = ?")
                  .bind(lock_id.to_string())
                  .fetch_optional(&self.pool)
                  .await
                  .map_err(backend)?;
              row.map(|row| {
                  serde_json::from_str(row.get::<&str, _>("data_json")).map_err(backend)
              })
              .transpose()
          }

          async fn list_session_locks(
              &self,
              session_id: sessionweft_core::SessionId,
              workspace_id: &str,
              now: chrono::DateTime<Utc>,
          ) -> Result<Vec<LockLease>, RepositoryError> {
              let rows = sqlx::query(
                  r#"
                  SELECT data_json FROM lock_leases
                  WHERE session_id = ? AND workspace_id = ? AND expires_at > ?
                  ORDER BY fencing_token ASC
                  "#,
              )
              .bind(session_id.to_string())
              .bind(workspace_id)
              .bind(now.to_rfc3339())
              .fetch_all(&self.pool)
              .await
              .map_err(backend)?;
              rows.into_iter()
                  .map(|row| {
                      serde_json::from_str(row.get::<&str, _>("data_json")).map_err(backend)
                  })
                  .collect()
          }

      \2''',
                  'SQLite lock lookup',
              )
          sqlite.write_text(text)

          control = Path('crates/sessionweft-control-plane/src/lib.rs')
          text = control.read_text()
          lock_methods = r'''    pub async fn heartbeat_lock(
              &self,
              session_id: SessionId,
              workspace_id: &str,
              lock_id: Uuid,
              owner_id: &str,
              fencing_token: u64,
              ttl_seconds: u32,
              context: &OperationContext,
          ) -> Result<LockLease, ControlPlaneError> {
              let lease = self
                  .require_session_lock(session_id, workspace_id, lock_id)
                  .await?;
              ensure_lock_authority(&lease, owner_id, fencing_token)?;
              self.orchestration
                  .heartbeat_lock(
                      lock_id,
                      owner_id,
                      fencing_token,
                      ttl_seconds,
                      context.correlation_id,
                      context.actor_id(),
                  )
                  .await
                  .map_err(ControlPlaneError::Orchestration)
          }

          pub async fn release_lock(
              &self,
              session_id: SessionId,
              workspace_id: &str,
              lock_id: Uuid,
              owner_id: &str,
              fencing_token: u64,
              context: &OperationContext,
          ) -> Result<(), ControlPlaneError> {
              let lease = self
                  .require_session_lock(session_id, workspace_id, lock_id)
                  .await?;
              ensure_lock_authority(&lease, owner_id, fencing_token)?;
              self.orchestration
                  .release_lock(
                      lock_id,
                      owner_id,
                      fencing_token,
                      context.correlation_id,
                      context.actor_id(),
                  )
                  .await
                  .map_err(ControlPlaneError::Orchestration)
          }

          pub async fn list_locks(
              &self,
              session_id: SessionId,
              workspace_id: &str,
          ) -> Result<Vec<LockLease>, ControlPlaneError> {
              self.ensure_session(session_id).await?;
              self.orchestration
                  .list_session_locks(session_id, workspace_id)
                  .await
                  .map_err(ControlPlaneError::Orchestration)
          }

          pub async fn remember('''
          text = sub_once(
              text,
              r'    pub async fn heartbeat_lock\(.*?    pub async fn remember\(',
              lock_methods,
              'Control Plane lock lifecycle',
          )
          if 'async fn require_session_lock(' not in text:
              marker = '''    async fn ensure_session(&self, session_id: SessionId) -> Result<(), ControlPlaneError> {
              self.get_session(session_id).await.map(|_| ())
          }
'''
              replacement = '''    async fn require_session_lock(
              &self,
              session_id: SessionId,
              workspace_id: &str,
              lock_id: Uuid,
          ) -> Result<LockLease, ControlPlaneError> {
              self.ensure_session(session_id).await?;
              let lease = self
                  .orchestration
                  .get_lock(lock_id)
                  .await
                  .map_err(ControlPlaneError::Orchestration)?
                  .ok_or(ControlPlaneError::LockNotFound(lock_id))?;
              ensure_scope("lock", session_id, lease.session_id)?;
              if lease.resource.workspace_id() != workspace_id {
                  return Err(ControlPlaneError::LockWorkspaceMismatch {
                      lock_id,
                      expected: workspace_id.to_owned(),
                      actual: lease.resource.workspace_id().to_owned(),
                  });
              }
              Ok(lease)
          }

      ''' + marker
              if marker not in text:
                  raise SystemExit('ensure_session marker not found')
              text = text.replace(marker, replacement, 1)
          if 'fn ensure_lock_authority(' not in text:
              marker = 'fn ensure_scope(\n'
              helper = '''fn ensure_lock_authority(
              lease: &LockLease,
              owner_id: &str,
              fencing_token: u64,
          ) -> Result<(), ControlPlaneError> {
              if lease.owner_id == owner_id && lease.fencing_token == fencing_token {
                  return Ok(());
              }
              Err(ControlPlaneError::LockAuthorityMismatch {
                  lock_id: lease.lock_id,
              })
          }

          '''
              if marker not in text:
                  raise SystemExit('ensure_scope marker not found')
              text = text.replace(marker, helper + marker, 1)
          if 'LockNotFound(Uuid)' not in text:
              marker = '    #[error("{resource} belongs to session {actual}, expected session {expected}")]\n'
              variants = '''    #[error("lock {0} not found")]
          LockNotFound(Uuid),
          #[error("lock {lock_id} belongs to workspace '{actual}', expected '{expected}'")]
          LockWorkspaceMismatch {
              lock_id: Uuid,
              expected: String,
              actual: String,
          },
          #[error("lock {lock_id} owner or fencing token does not match")]
          LockAuthorityMismatch { lock_id: Uuid },
      '''
              if marker not in text:
                  raise SystemExit('ControlPlaneError marker not found')
              text = text.replace(marker, variants + marker, 1)
          text = text.replace(
              '''            .heartbeat_lock(
                      session.id,
                      lease.lock_id,''',
              '''            .heartbeat_lock(
                      session.id,
                      "workspace",
                      lease.lock_id,''',
              1,
          )
          text = text.replace(
              '''            .release_lock(
                      session.id,
                      lease.lock_id,''',
              '''            .release_lock(
                      session.id,
                      "workspace",
                      lease.lock_id,''',
              1,
          )
          if 'cross_session_lock_access_is_denied' not in text:
              marker = '''    #[tokio::test]
          async fn missing_session_blocks_dependent_resources() {'''
              test = '''    #[tokio::test]
          async fn cross_session_lock_access_is_denied() {
              let control_plane = control_plane().await;
              let context = OperationContext::system("test");
              let session_a = control_plane
                  .create_session("session-a", &context)
                  .await
                  .expect("session a");
              let session_b = control_plane
                  .create_session("session-b", &context)
                  .await
                  .expect("session b");
              let lease = control_plane
                  .acquire_lock(
                      &LockRequest {
                          session_id: session_a.id,
                          owner_id: "worker-a".into(),
                          resource: LockResource::Workspace {
                              workspace_id: "shared".into(),
                          },
                          mode: LockMode::Exclusive,
                          ttl_seconds: 30,
                      },
                      &context,
                  )
                  .await
                  .expect("session a lock");

              assert!(control_plane
                  .list_locks(session_b.id, "shared")
                  .await
                  .expect("session b lock list")
                  .is_empty());
              assert!(matches!(
                  control_plane
                      .heartbeat_lock(
                          session_b.id,
                          "shared",
                          lease.lock_id,
                          &lease.owner_id,
                          lease.fencing_token,
                          30,
                          &context,
                      )
                      .await,
                  Err(ControlPlaneError::SessionScopeMismatch { .. })
              ));
              assert!(matches!(
                  control_plane
                      .release_lock(
                          session_b.id,
                          "shared",
                          lease.lock_id,
                          &lease.owner_id,
                          lease.fencing_token,
                          &context,
                      )
                      .await,
                  Err(ControlPlaneError::SessionScopeMismatch { .. })
              ));
              assert_eq!(
                  control_plane
                      .list_locks(session_a.id, "shared")
                      .await
                      .expect("session a lock list")
                      .len(),
                  1
              );
          }

      ''' + marker
              if marker not in text:
                  raise SystemExit('missing-session test marker not found')
              text = text.replace(marker, test, 1)
          control.write_text(text)
          PY
          cargo fmt --all
      - name: Commit Session-scoped lock security
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'security/session-scoped-locks'
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "security: enforce Session-scoped lock lifecycle"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
