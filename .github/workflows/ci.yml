name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply targeted source fix
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("crates/sessionweft-orchestration/src/lib.rs")
          text = path.read_text()
          text = text.replace(
              "use chrono::{DateTime, Duration, Utc};",
              "use chrono::{DateTime, Utc};",
          )
          text = text.replace(
              "mod tests {\n    use super::*;",
              "mod tests {\n    use chrono::Duration;\n\n    use super::*;",
          )
          path.write_text(text)
          PY
      - name: Normalize generated files
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit generated files on internal PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- Cargo.lock '*.rs'
            git commit -m "fix: correct orchestration test-only import"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 200 clippy.log
          exit $status
      - name: Upload compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: orchestration-clippy-log
          path: clippy.log
          retention-days: 1
      - name: Test
        run: cargo test --workspace --locked
