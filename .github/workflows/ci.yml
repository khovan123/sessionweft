name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  actions: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Restore verified Cargo.lock artifact once
        if: github.event_name == 'pull_request' && github.head_ref == 'release/production-hardening-clean'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf /tmp/sessionweft-lock
          mkdir -p /tmp/sessionweft-lock
          gh run download 29930453466 \
            --repo "${GITHUB_REPOSITORY}" \
            --name production-hardening-cargo-lock \
            --dir /tmp/sessionweft-lock
          test -f /tmp/sessionweft-lock/Cargo.lock
          test "$(wc -c < /tmp/sessionweft-lock/Cargo.lock)" -gt 90000
          ! grep -q '^name = "rsa"$' /tmp/sessionweft-lock/Cargo.lock
          cp /tmp/sessionweft-lock/Cargo.lock Cargo.lock
          cargo metadata --locked --format-version 1 --no-deps > /dev/null
          if ! git diff --quiet -- Cargo.lock; then
            git config user.name sessionweft-ci
            git config user.email sessionweft-ci@users.noreply.github.com
            git add Cargo.lock
            git commit -m 'build: restore verified production lockfile'
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: |
          set +e
          cargo fmt --all --check > fmt.log 2>&1
          status=$?
          cat fmt.log
          exit $status
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-log
          path: fmt.log
          retention-days: 3
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 300 clippy.log
          exit $status
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
          retention-days: 3
      - name: Test
        run: |
          set +e
          cargo test --workspace --locked > test.log 2>&1
          status=$?
          tail -n 400 test.log
          exit $status
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 3
