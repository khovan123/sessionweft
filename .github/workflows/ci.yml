name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Harden worktree registry parser once
        if: github.event_name == 'pull_request' && github.head_ref == 'implementation/git-merge-conflict-recovery' && github.actor != 'github-actions[bot]'
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('crates/sessionweft-git-local/src/merge_execution.rs')
          text = path.read_text()
          old = '''        let expected_branch = format!("refs/heads/{}", entry.source_branch);
                  for block in listing.split("\n\n") {
                      let mut path = None;
                      let mut branch = None;
                      for line in block.lines() {
                          if let Some(value) = line.strip_prefix("worktree ") {
                              path = Some(value.to_owned());
                          } else if let Some(value) = line.strip_prefix("branch ") {
                              branch = Some(value.to_owned());
                          }
                      }
                      if branch.as_deref() == Some(expected_branch.as_str()) {
                          return path.ok_or_else(|| {
                              GitOperationError::InvalidOutput(
                                  "Git worktree registry entry is missing its path".into(),
                              )
                          });
                      }
                  }'''
          new = '''        let expected_branch = format!("refs/heads/{}", entry.source_branch);
                  let mut current_path = None;
                  for raw_line in listing.lines() {
                      let line = raw_line.trim_end_matches('\\r');
                      if line.is_empty() {
                          current_path = None;
                          continue;
                      }
                      if let Some(value) = line.strip_prefix("worktree ") {
                          current_path = Some(value.to_owned());
                      } else if let Some(value) = line.strip_prefix("branch ") {
                          if value == expected_branch {
                              return current_path.ok_or_else(|| {
                                  GitOperationError::InvalidOutput(
                                      "Git worktree registry entry is missing its path".into(),
                                  )
                              });
                          }
                      }
                  }'''
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('worktree registry parser block not found')
          path.write_text(text)
          PY
          cargo fmt --all
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "fix: parse Git worktree registry records robustly"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: |
          set +e
          cargo fmt --all --check > fmt.log 2>&1
          status=$?
          cat fmt.log
          exit $status
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-log
          path: fmt.log
          retention-days: 3
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 300 clippy.log
          exit $status
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
          retention-days: 3
      - name: Test
        run: |
          set +e
          cargo test --workspace --locked > test.log 2>&1
          status=$?
          tail -n 400 test.log
          exit $status
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 3
