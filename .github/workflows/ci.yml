name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Materialize SQLx dependency cleanup artifact
        if: github.head_ref == 'release/production-hardening'
        run: |
          cargo generate-lockfile
          cargo tree -i rsa > rsa-tree.log 2>&1 || true
          cargo tree -i sqlx-mysql > sqlx-mysql-tree.log 2>&1 || true
          tar -czf sqlx-audit-fix.tar.gz Cargo.lock rsa-tree.log sqlx-mysql-tree.log
      - name: Upload SQLx dependency cleanup artifact
        if: github.head_ref == 'release/production-hardening'
        uses: actions/upload-artifact@v4
        with:
          name: sqlx-audit-fix
          path: sqlx-audit-fix.tar.gz
          if-no-files-found: error
          retention-days: 3
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: |
          set +e
          cargo fmt --all --check > fmt.log 2>&1
          status=$?
          cat fmt.log
          exit $status
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-log
          path: fmt.log
          retention-days: 3
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 300 clippy.log
          exit $status
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
          retention-days: 3
      - name: Test
        run: |
          set +e
          cargo test --workspace --locked > test.log 2>&1
          status=$?
          tail -n 400 test.log
          exit $status
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 3
