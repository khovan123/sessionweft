name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Scope scheduler imports to tests
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'implementation/durable-scheduler-claims'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('crates/sessionweft-scheduler-sqlite/src/lib.rs')
          text = path.read_text()
          text = text.replace('use chrono::Utc;\n', '', 1)
          text = text.replace(
              'use sessionweft_orchestration::{WorkflowExecution, WorkflowNodeStatus};',
              'use sessionweft_orchestration::WorkflowExecution;',
              1,
          )
          marker = '''    use sessionweft_core::SessionId;
          use sessionweft_execution::{AgentManifest, AgentRole, AgentService, Capability};
          use sessionweft_execution_sqlite::SqliteAgentRepository;
          use sessionweft_orchestration::{
              OrchestrationService, WorkflowDefinition, WorkflowNodeDefinition, WorkflowNodeKind,
              WorkflowStatus,
          };
'''
          replacement = '''    use chrono::Utc;
          use sessionweft_core::SessionId;
          use sessionweft_execution::{AgentManifest, AgentRole, AgentService, Capability};
          use sessionweft_execution_sqlite::SqliteAgentRepository;
          use sessionweft_orchestration::{
              OrchestrationService, WorkflowDefinition, WorkflowNodeDefinition, WorkflowNodeKind,
              WorkflowNodeStatus, WorkflowStatus,
          };
'''
          if marker in text:
              text = text.replace(marker, replacement, 1)
          elif 'use chrono::Utc;' not in text[text.find('#[cfg(test)]'):]:
              raise SystemExit('scheduler test import marker not found')
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit scheduler import fix
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'implementation/durable-scheduler-claims'
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "fix: scope scheduler imports to tests"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
