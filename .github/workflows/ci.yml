name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply targeted source fixes
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          knowledge = Path("crates/sessionweft-knowledge/src/lib.rs")
          text = knowledge.read_text()
          text = text.replace(
              "for query_term in &query_terms {",
              "for query_term in query_terms.keys() {",
          )
          knowledge.write_text(text)

          sqlite = Path("crates/sessionweft-knowledge-sqlite/src/lib.rs")
          text = sqlite.read_text()
          pattern = re.compile(
              r"\.filter\(\|result\| \{\s*"
              r"result\s*\.as_ref\(\)\s*"
              r"\.is_err_or\(\|record\| classes\.is_empty\(\) \|\| "
              r"classes\.contains\(&record\.class\)\)\s*\}\)"
          )
          replacement = """.filter(|result| match result {
                Ok(record) => classes.is_empty() || classes.contains(&record.class),
                Err(_) => true,
            })"""
          text, count = pattern.subn(replacement, text)
          if count != 1:
              raise SystemExit(f"expected one memory filter patch, found {count}")
          sqlite.write_text(text)
          PY
      - name: Normalize generated files
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit generated files on internal PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- Cargo.lock '*.rs'
            git commit -m "fix: enforce Rust 1.88 knowledge filtering"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 200 clippy.log
          exit $status
      - name: Upload compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: knowledge-clippy-log
          path: clippy.log
          retention-days: 1
      - name: Test
        run: cargo test --workspace --locked
