name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply resumable client patch once
        if: github.event_name == 'pull_request' && github.head_ref == 'implementation/resumable-clients' && github.actor != 'github-actions[bot]'
        run: |
          set +e
          {
            python .github/scripts/patch_resumable_clients.py
            sed -i 's/, PtySystem//' crates/sessionweft-client-protocol/src/pty.rs
            sed -i 's/Ok(session\.descriptor()?)/session.descriptor()/' crates/sessionweft-client-protocol/src/pty.rs
            cargo fmt --all
            cargo generate-lockfile
          } > patch.log 2>&1
          status=$?
          cat patch.log
          if [ $status -ne 0 ]; then
            exit $status
          fi
          if [ -n "$(git status --porcelain -- Cargo.toml Cargo.lock apps crates)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock apps crates
            git commit -m "fix: resolve resumable client compile diagnostics"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Upload patch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: client-patch-log
          path: patch.log
          retention-days: 3
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: |
          set +e
          cargo fmt --all --check > fmt.log 2>&1
          status=$?
          cat fmt.log
          exit $status
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-log
          path: fmt.log
          retention-days: 3
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 300 clippy.log
          exit $status
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
          retention-days: 3
      - name: Test
        run: |
          set +e
          cargo test --workspace --locked > test.log 2>&1
          status=$?
          tail -n 400 test.log
          exit $status
      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 3
