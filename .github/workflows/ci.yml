name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply reviewed PolicyConfig fix on execution PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'implementation/agent-tool-git-boundary-ready'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('crates/sessionweft-execution/src/lib.rs')
          text = path.read_text()
          old_derive = '#[derive(Debug, Clone, PartialEq, Eq)]\npub struct PolicyConfig {'
          new_derive = '#[derive(Debug, Clone, PartialEq, Eq, Default)]\npub struct PolicyConfig {'
          if old_derive in text:
              text = text.replace(old_derive, new_derive, 1)
          elif new_derive not in text:
              raise SystemExit('PolicyConfig derive marker not found')

          old_impl = '''impl Default for PolicyConfig {
    fn default() -> Self {
        Self {
            allowed: BTreeSet::new(),
            approval_required: BTreeSet::new(),
            denied: BTreeSet::new(),
        }
    }
}

'''
          if old_impl in text:
              text = text.replace(old_impl, '', 1)
          elif 'impl Default for PolicyConfig' in text:
              raise SystemExit('unexpected PolicyConfig Default implementation')
          path.write_text(text)
          PY
          cargo fmt --all
      - name: Commit reviewed fix on execution PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.head_ref == 'implementation/agent-tool-git-boundary-ready'
        run: |
          if [ -n "$(git status --porcelain -- '*.rs')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- '*.rs'
            git commit -m "fix: derive default policy configuration"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify dependency lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Format
        run: |
          set +e
          cargo fmt --all --check > fmt.log 2>&1
          status=$?
          cat fmt.log
          exit $status
      - name: Upload format diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-log
          path: fmt.log
          retention-days: 3
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 300 clippy.log
          exit $status
      - name: Upload Clippy diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-log
          path: clippy.log
          retention-days: 3
      - name: Test
        run: cargo test --workspace --locked
