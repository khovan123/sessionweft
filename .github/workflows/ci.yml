name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Apply execution boundary hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          execution = Path("crates/sessionweft-execution/src/lib.rs")
          text = execution.read_text()

          old = '''        if !self.input_schema.is_object() {
              return Err(ExecutionError::Validation(
                  "tool input schema must be a JSON object".into(),
              ));
          }
          Ok(())'''
          new = '''        if !self.input_schema.is_object() {
              return Err(ExecutionError::Validation(
                  "tool input schema must be a JSON object".into(),
              ));
          }
          if !self
              .permissions
              .contains(&Permission::Tool(self.name.clone()))
          {
              return Err(ExecutionError::Validation(
                  "tool descriptor must include its self-named Tool permission".into(),
              ));
          }
          Ok(())'''
          if old not in text:
              raise SystemExit("tool descriptor validation marker not found")
          text = text.replace(old, new, 1)

          old = '''    pub async fn invoke(
              &self,
              agent: &AgentRecord,
              invocation: &ToolInvocation,
              approval: Option<&ApprovalGrant>,
          ) -> Result<ToolResult, ToolError> {
              let descriptor = self'''
          new = '''    pub async fn invoke(
              &self,
              agent: &AgentRecord,
              invocation: &ToolInvocation,
              approval: Option<&ApprovalGrant>,
          ) -> Result<ToolResult, ToolError> {
              if invocation.session_id != agent.session_id || invocation.agent_id != agent.id {
                  return Err(ToolError::Denied("agent/session scope mismatch".into()));
              }
              let descriptor = self'''
          if old not in text:
              raise SystemExit("MCP invoke marker not found")
          text = text.replace(old, new, 1)

          old = '''            ["worktree", "add", "-b", branch, relative_path],'''
          new = '''            ["worktree", "add", "-b", branch, "--", relative_path],'''
          if old not in text:
              raise SystemExit("Git worktree marker not found")
          text = text.replace(old, new, 1)
          execution.write_text(text)

          sqlite = Path("crates/sessionweft-execution-sqlite/src/lib.rs")
          text = sqlite.read_text()
          old = '''            .filter(|record| record.as_ref().is_err_or(|agent| agent.is_stale_at(now)))'''
          new = '''            .filter(|record| match record {
                  Ok(agent) => agent.is_stale_at(now),
                  Err(_) => true,
              })'''
          if old not in text:
              raise SystemExit("stale agent filter marker not found")
          sqlite.write_text(text.replace(old, new, 1))
          PY
      - name: Normalize generated files
        run: |
          cargo fmt --all
          cargo generate-lockfile
      - name: Commit generated files on internal PR
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -- Cargo.lock '*.rs'
            git commit -m "fix: harden agent tool MCP and Git boundaries"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - name: Verify formatting
        run: cargo fmt --all --check
      - name: Clippy
        run: |
          set +e
          cargo clippy --workspace --all-targets --locked -- -D warnings > clippy.log 2>&1
          status=$?
          tail -n 200 clippy.log
          exit $status
      - name: Upload compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: execution-clippy-log
          path: clippy.log
          retention-days: 1
      - name: Test
        run: cargo test --workspace --locked
