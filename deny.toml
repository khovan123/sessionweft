[advisories]
yanked = "deny"
unmaintained = "workspace"
# RUSTSEC-2023-0071 is locked only through SQLx's optional MySQL metadata.
# The supply-chain gate proves both `cargo tree -i rsa` and
# `cargo tree -i sqlx-mysql` are empty before accepting this exception.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib"
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
